<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>المشاريع</title>

  <style>
    body {
      font-family: Arial;
      direction: rtl;
      text-align: center;
      background: #f5f5f5;
    }

    table {
      border-collapse: collapse;
      width: 95%;
      margin: auto;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    th {
      background: #2c3e50;
      color: white;
    }
  </style>
</head>

<body>

<h2>📊 المشاريع</h2>

<table id="table"></table>

<script>
fetch("data.csv")
.then(res => res.text())
.then(data => {
    let rows = data.trim().split("\n");
    let table = document.getElementById("table");

    rows.forEach((row, index) => {
        let tr = document.createElement("tr");
        let cols = row.split(",");

        cols.forEach(col => {
            let cell = document.createElement(index === 0 ? "th" : "td");
            cell.textContent = col;
            tr.appendChild(cell);
        });

        table.appendChild(tr);
    });
});
</script>

</body>
</html>
